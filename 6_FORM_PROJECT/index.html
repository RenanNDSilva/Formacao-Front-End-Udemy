<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h3>Cadastre seu veículo para vender mais rápido!</h3>
        </div>
        <div class="form-container">
            <div class="form-header">
                <p>Preencha os dados do seu veículo</p>
            </div>
            <div class="form-body">
                <h1 class="form-title">Venda fácil seu veículo!</h1>
                <p>Descreva as características do seu veículo e marque os opcionais que ele possui:</p>
                <form>
                    <div class="box-input">
                        <label for="title">Titulo do Anuncio <span class="required-field">*</span></label>
                        <input type="text" id="title" name="title" class="block" placeholder="Preço do seu veículo"
                            minlength="1" maxlength="30" required>
                    </div>
                    <div class="box-input">
                        <label for="price">Preço <span class="required-field">*</span></label>
                        <input type="number" id="price" name="price" class="block" placeholder="Preço do seu veículo"
                            minlength="1" maxlength="30" required>
                    </div>
                    <div class="box-input">
                        <label for="description">Descrição <span class="required-field">*</span></label>
                        <textarea name="description" id="description" class="block"
                            placeholder="Descrição do seu veículo" minlength="1" maxlength="200" required></textarea>
                    </div>
                    <div class="box-input">
                        <label for="brand">Marca <span class="required-field">*</span></label>
                        <input type="text" id="brand" name="brand" class="block" placeholder="Marca do seu veículo"
                            minlength="1" maxlength="30" required>
                    </div>
                    <div class="box-input">
                        <label for="model">Modelo <span class="required-field">*</span></label>
                        <input type="text" id="model" name="model" class="block" placeholder="Modelo do seu veículo"
                            minlength="1" maxlength="30" required>
                    </div>
                    <div class="box-input">
                        <label for="mileage
                        ">Quilometragem <span class="required-field">*</span></label>
                        <input type="number" id="mileage
                        " name="mileage
                        " class="block" placeholder="Quilometragem do seu veículo" minlength="1" maxlength="30"
                            required>
                    </div>
                    <div class="box-input">
                        <label for="purchase_date
                        ">Data de Compra <span class="required-field">*</span></label>
                        <input type="date" id="purchase_date
                        " name="purchase_date
                        " class="block" required>
                    </div>
                    <div class="box-input">
                        <p>Tipo de cambio: <span class="required-field">*</span></p>
                        <input type="radio" id="manual" name="gear">
                        <label for="manual">Manual</label>
                        <input type="radio" id="automatic" name="gear">
                        <label for="automatic">Automático</label>
                    </div>
                    <div class="optional-box">
                        <p>Opcionais:</p>
                        <ul class="optional-list">
                            <li>
                                <input type="checkbox" id="air_conditioning" name="optional">
                                <label for="air_conditioning">Ar Condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" id="power_steering" name="optional">
                                <label for="power_steering">Direção Hidráulica</label>
                            </li>
                            <li>
                                <input type="checkbox" id="power_windows" name="optional">
                                <label for="power_windows">Vidros Elétricos</label>
                            </li>
                            <li>
                                <input type="checkbox" id="sunroof" name="optional">
                                <label for="sunroof">Teto Solar</label>
                            </li>
                        </ul>
                    </div>
                    <div class="optional-box">
                        <ul class="optional-list">
                            <li>
                                <input type="checkbox" id="leather_seats" name="optional">
                                <label for="leather_seats">Bancos de Couro</label>
                            </li>
                            <li>
                                <input type="checkbox" id="bluetooth" name="optional">
                                <label for="bluetooth">Bluetooth</label>
                            </li>
                            <li>
                                <input type="checkbox" id="backup_camera" name="optional">
                                <label for="backup_camera">Câmera de Ré</label>
                            </li>
                            <li>
                                <input type="checkbox" id="parking_sensors" name="optional">
                                <label for="parking_sensors">Sensores de Estacionamento</label>
                            </li>
                        </ul>
                    </div>
                    <div class="box-input">
                        <p>Fotos do carro: <span class="required-field">*</span></p>
                        <input type="file" multiple accept="image/*" id="images" name="images" required>
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
            </div>
        </div>
    </div>
</body>

</html>
