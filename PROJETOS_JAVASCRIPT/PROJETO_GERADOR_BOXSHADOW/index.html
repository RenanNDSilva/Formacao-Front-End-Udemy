<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Box-Shadow</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>

<body>
    <div id="box-shadow-generator">
        <div id="controls-container">
            <h2>Configurações da Box-Shadow</h2>
            <div class="form-control">
                <div class="range-input">
                    <label for="horizontal">Deslocamento Horizontal:</label>
                    <input type="range" id="horizontal" name="horizontal" min="-50" max="50" value="5">
                </div>
                <div class="reference-input">
                    <input type="text" id="horizontal-value" name="horizontal-value">
                    <p>px</p>
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="vertical">Deslocamento Vertical:</label>
                    <input type="range" id="vertical" name="vertical" min="-50" max="50" value="5">
                </div>
                <div class="reference-input">
                    <input type="text" id="vertical-value" name="vertical-value">
                    <p>px</p>
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="blur">Intensidade do Desfoque:</label>
                    <input type="range" id="blur" name="blur" min="0" max="100" value="10">
                </div>
                <div class="reference-input">
                    <input type="text" id="blur-value" name="blur-value">
                    <p>px</p>
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="spread">Intensidade do Espalhamento:</label>
                    <input type="range" id="spread" name="spread" min="-50" max="50" value="5">
                </div>
                <div class="reference-input">
                    <input type="text" id="spread-value" name="spread-value">
                    <p>px</p>
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="color">Cor da Sombra:</label>
                    <input type="color" id="color" name="color" value="#000000">
                </div>
                <div class="reference-input">
                    <input type="text" id="color-value" name="color-value">
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="opacity">Opacidade da Sombra:</label>
                    <input type="range" id="opacity" name="opacity" min="0" max="1" step="0.1" value="0.5">
                </div>
                <div class="reference-input">
                    <input type="text" id="opacity-value" name="opacity-value">
                    <p>px</p>
                </div>
            </div>
            <div class="form-control">
                <div class="range-input">
                    <label for="inset">Sombra Interna:</label>
                    <input type="checkbox" id="inset" name="inset">
                </div>
            </div>
        </div>
        <div id="preview">
            <h2>Visualização da Box-Shadow</h2>
            <div id="box"></div>
        </div>
    </div>
    <div id="generated-rule">
        <h2>Regra de Box-Shadow Gerada:</h2>
        <div id="rules-area">
            <p id="rule">Box-Shadow: <span></span>;</p>
            <p id="webkit-rule">-webkit-Box-Shadow: <span></span>;</p>
            <p id="moz-rule">-moz-Box-Shadow: <span></span>;</p>
        </div>
        <p id="copy-instructions">Clique para copiar a regra de Box-Shadow!</p>
    </div>
</body>

</html>
