<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Tabuada</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <h2>Digite o número para a tabuada:</h2>
    <form id="multiplication-form">
        <div class="form-control">
            <label for="number">Tabuada do:</label>
            <input type="number" id="number" name="number" placeholder="3">
        </div>
        <div class="form-control">
            <label for="multiplicator">Multiplicador:</label>
            <input type="number" id="multiplicator" name="multiplicator" value="10">
        </div>
        <input type="submit" value="Calcular">
    </form>
    <div id="multiplication-table">
        <h2 id="multiplication-title">Tabuada do número: <span></span></h2>
        <div id="multiplication-operations">
            <p>Informe o número e o multiplicador para calcular a tabuada.</p>
        </div>
    </div>
</body>
</html>
